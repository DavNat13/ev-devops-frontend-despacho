version: "3.8"

services:
  frontend-despacho:
    image: ${ECR_REPO_URL_FRONTEND}:latest
    container_name: frontend-despacho
    restart: always
    ports:
      # Mapeamos el puerto 80 del host al 8080 interno de Nginx unprivileged
      - "80:8080"
    environment:
      # Variables para que el Front sepa dónde golpear a las APIs
      VITE_API_DESPACHOS_URL: http://${BACKEND_PRIVATE_IP}:8081
      VITE_API_VENTAS_URL: http://${BACKEND_PRIVATE_IP}:8082
    networks:
      - front-tier

networks:
  front-tier:
    driver: bridge
